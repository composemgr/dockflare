# nginx proxy address - http://172.17.0.1:62000

name: dockflare
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  app:
    image: alplat/dockflare:latest
    container_name: dockflare-app
    hostname: ${BASE_HOST_NAME:-localhost}
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      REDIS_URL: redis://dockflare-redis:6379/0
      DOCKER_HOST: tcp://dockflare-socket-proxy:2375
      CONTAINER_NAME: dockflare-app
    ports:
      - "172.17.0.1:62000:5000"
    volumes:
      - "./volumes/data/dockflare:/app/data:z"
    depends_on:
      - dockflare-redis
      - dockflare-socket-proxy
    networks:
      - dockflare
      - proxy
      - cloudflare
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://dockflare-app:5000'
      - 'cloudflare.hostname=dockflare.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.dockflare-app.entrypoints=http'
      - 'traefik.http.routers.dockflare-app-secure.tls=true'
      - 'traefik.http.routers.dockflare-app.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.dockflare-app-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.dockflare-app.middlewares=dockflare-app-https-redirect'
      - 'traefik.http.routers.dockflare-app-secure.entrypoints=https'
      - 'traefik.http.routers.dockflare-app-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.dockflare-app-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.dockflare-app-secure.service=dockflare-app'
      - 'traefik.http.services.dockflare-app.loadbalancer.server.port=5000'

  dockflare-redis:
    image: redis:alpine
    container_name: dockflare-redis
    hostname: dockflare-redis
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      CONTAINER_NAME: dockflare-redis
    volumes:
      - "./volumes/data/db/redis/dockflare:/data"
    networks:
      - dockflare

  dockflare-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: dockflare-socket-proxy
    hostname: dockflare-socket-proxy
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      CONTAINERS: 1
      EVENTS: 1
      NETWORKS: 1
      IMAGES: 1
      POST: 1
      PING: 1
      INFO: 1
      EXEC: 1
      CONTAINER_NAME: dockflare-socket-proxy
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - dockflare

networks:
  dockflare:
    name: dockflare
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
